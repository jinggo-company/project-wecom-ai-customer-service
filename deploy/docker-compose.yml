version: '3.8'

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "5000:5000"
    environment:
      - WECOM_CORP_ID=${WECOM_CORP_ID}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID}
      - WECOM_SECRET=${WECOM_SECRET}
      - WECOM_TOKEN=${WECOM_TOKEN}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    networks:
      - wecom-net

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/wecom_ai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - wecom-net

  celery_worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    command: celery -A sop.engine worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/wecom_ai
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    networks:
      - wecom-net

  celery_beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    command: celery -A sop.engine beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - wecom-net

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wecom-net

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=wecom_ai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wecom-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - wecom-net

volumes:
  postgres-data:
  redis-data:

networks:
  wecom-net:
    driver: bridge
